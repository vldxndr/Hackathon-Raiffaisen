services:

  fastapi:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MCP_URL=http://mcp:8001/sse
    volumes:
      - ./models:/app/models:ro
    depends_on:
      - mcp
    restart: unless-stopped

  mcp:
    build: .
    command: python mcp_server.py
    ports:
      - "8001:8001"
    environment:
      - MCP_PORT=8001
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - WEBUI_SECRET_KEY=raiffeisen-hackathon
      - ENABLE_OLLAMA_API=false
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - mcp
    restart: unless-stopped

volumes:
  openwebui_data:
